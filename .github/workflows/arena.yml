name: AI Arena Daily Run

on:
  schedule:
    # 22:30 UTC 월~금 = 미국 장 마감 후 (한국시간 오전 7:30)
    - cron: "30 22 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: arena
  cancel-in-progress: false

jobs:
  arena:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SDK
        run: pip install anthropic

      - name: Run arena
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ARENA_MODEL: ${{ vars.ARENA_MODEL }}
        run: python arena/run_arena.py

      - name: Commit results
        run: |
          git config user.name "asurada-arena[bot]"
          git config user.email "arena-bot@users.noreply.github.com"
          git add arena/data arena/memory
          git diff --cached --quiet && echo "no changes" || {
            git commit -m "arena: daily run $(date -u +%F)"
            git push
          }
